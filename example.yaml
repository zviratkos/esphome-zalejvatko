esphome:
  name: zalejvatko

esp32:
  board: esp32dev
  framework:
    type: arduino

external_components:
  - source:
      type: local
      path: components
    components: [zalejvatko]

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "Zalejvatko fallback"
    password: "zalejvatko123"

captive_portal:

# NTP cas - funguje i bez HA, pokud je pripojena WiFi
time:
  - platform: sntp
    id: sntp_time
    timezone: Europe/Prague

# nativni web UI - bezi primo na ESP32, nezavisle na HA
web_server:
  port: 80

api:
logger:

# --- hlavni hub: piny uprav podle sve desky (puvodni hodnoty z .ino) ---
zalejvatko:
  id: hub
  time_id: sntp_time
  valve_enable_pin: GPIO17
  valve_signal_pin: GPIO5
  address_pins: [GPIO4, GPIO0, GPIO2, GPIO15]
  pump_pin: GPIO19
  ml_per_sec: 4.0   # kalibrace: kolik ml cerpadlo dopravi za 1 sekundu - zmerit a upravit

# --- kanal 0 ---
switch:
  - platform: zalejvatko
    zalejvatko_id: hub
    channel: 0
    name: "Kvetina 1 - povoleno"

number:
  - platform: zalejvatko
    zalejvatko_id: hub
    channel: 0
    name: "Kvetina 1 - davka"

text:
  - platform: zalejvatko
    zalejvatko_id: hub
    channel: 0
    name: "Kvetina 1 - rozvrh"

button:
  - platform: zalejvatko
    zalejvatko_id: hub
    channel: 0
    name: "Kvetina 1 - zalit hned"

